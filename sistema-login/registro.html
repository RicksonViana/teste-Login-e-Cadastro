<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>
<link rel="stylesheet" href="styles/style.css">
</head>
<body>

<div class="container">

    <h2>Cadastro</h2>

    <form id="registerForm">

        <input
            type="text"
            name="name"
            placeholder="Nome"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="E-mail"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Senha"
            required
        >

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <p id="message"></p>

    <a href="login.html">
        Já tenho conta
    </a>

</div>

<script src="scripts/app-server.js"></script>

</body>
</html>
